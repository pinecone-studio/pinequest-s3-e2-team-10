name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy frontend to Vercel
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (
        (
          github.event.workflow_run.event == 'push' &&
          (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop')
        ) ||
        (
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.head_repository.full_name == github.repository
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ENV: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && 'production' || 'preview' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check Vercel secrets
        id: vercel
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Missing Vercel secrets. Skipping deployment."
          fi

      - name: Setup Node
        if: steps.vercel.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.vercel.outputs.configured == 'true'
        run: npm ci

      - name: Pull Vercel environment
        if: steps.vercel.outputs.configured == 'true'
        run: npx vercel pull --yes --environment="$VERCEL_ENV" --token="$VERCEL_TOKEN"

      - name: Build preview deployment
        if: steps.vercel.outputs.configured == 'true' && !(github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        if: steps.vercel.outputs.configured == 'true' && !(github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
        run: npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"

      - name: Build production deployment
        if: steps.vercel.outputs.configured == 'true' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        if: steps.vercel.outputs.configured == 'true' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
