name: CD

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: cd-${{ github.event.pull_request.number || github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy frontend to Vercel
    if: >
      (
        (
          github.event_name == 'pull_request' &&
          !github.event.pull_request.draft &&
          github.event.pull_request.head.repo.full_name == github.repository
        ) ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop')
        )
      )
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.finalize.outputs.configured }}
      vercel_env: ${{ steps.finalize.outputs.vercel_env }}
      deployment_url: ${{ steps.finalize.outputs.deployment_url }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    env:
      # This workflow is designed to deploy via the Vercel CLI and secrets.
      # It does not require Git integration in the Vercel project.
      VERCEL_ENV: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && 'production' || 'preview' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.workflow_run.head_sha }}

      - name: Check Vercel secrets
        id: vercel
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Missing Vercel secrets. Skipping deployment."
          fi

      - name: Setup Node
        if: steps.vercel.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.vercel.outputs.configured == 'true'
        run: npm ci

      - name: Pull Vercel environment
        if: steps.vercel.outputs.configured == 'true'
        run: npx vercel pull --yes --environment="$VERCEL_ENV" --token="$VERCEL_TOKEN"

      - name: Build preview deployment
        if: steps.vercel.outputs.configured == 'true' && env.VERCEL_ENV == 'preview'
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy_preview
        if: steps.vercel.outputs.configured == 'true' && env.VERCEL_ENV == 'preview'
        run: |
          deployment_url=$(npx vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN" | tail -n 1)
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $deployment_url"

      - name: Comment preview link on PR
        if: >
          steps.vercel.outputs.configured == 'true' &&
          github.event_name == 'pull_request' &&
          steps.deploy_preview.outputs.deployment_url != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy_preview.outputs.deployment_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- vercel-preview-comment -->';
            const body = `${marker}
            Vercel preview is ready:
            ${process.env.DEPLOYMENT_URL}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Build production deployment
        if: steps.vercel.outputs.configured == 'true' && env.VERCEL_ENV == 'production'
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        id: deploy_production
        if: steps.vercel.outputs.configured == 'true' && env.VERCEL_ENV == 'production'
        run: |
          deployment_url=$(npx vercel deploy --prebuilt --archive=tgz --prod --token="$VERCEL_TOKEN" | tail -n 1)
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Production URL: $deployment_url"

      - name: Finalize deployment outputs
        id: finalize
        run: |
          deployment_url="${{ steps.deploy_production.outputs.deployment_url || steps.deploy_preview.outputs.deployment_url }}"
          echo "configured=${{ steps.vercel.outputs.configured }}" >> "$GITHUB_OUTPUT"
          echo "vercel_env=$VERCEL_ENV" >> "$GITHUB_OUTPUT"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Resolved deployment URL: $deployment_url"

  record-production-deployment:
    name: Record production deployment in GitHub
    needs: deploy-frontend
    if: >
      needs.deploy-frontend.outputs.configured == 'true' &&
      needs.deploy-frontend.outputs.vercel_env == 'production' &&
      needs.deploy-frontend.outputs.deployment_url != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: ${{ needs.deploy-frontend.outputs.deployment_url }}
    steps:
      - name: Publish deployment metadata
        run: echo "Production deployment recorded at ${{ needs.deploy-frontend.outputs.deployment_url }}"
